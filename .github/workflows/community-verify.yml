name: Verify community runs

# No path filter — the standings consistency gate must also catch PRs that
# change the generator/CLI and forget to regenerate the committed artifacts.
on:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: npm test
      - name: Replay-verify every community run
        run: |
          shopt -s nullglob
          dirs=(community/runs/*/)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "no community runs found"; exit 1
          fi
          node packages/cli/dist/cli.js verify "${dirs[@]}"
      - name: Standings consistency gate
        run: |
          shopt -s nullglob
          tmp=$(mktemp -d)
          node packages/cli/dist/cli.js standings community/runs/*/ \
            --out "$tmp/STANDINGS.md" --json-out "$tmp/standings.json"
          fail=0
          for f in STANDINGS.md standings.json; do
            if [ ! -f "community/$f" ]; then
              echo "::error::community/$f is missing"; fail=1; continue
            fi
            if ! diff -u "community/$f" "$tmp/$f"; then
              echo "::error::community/$f is out of date"; fail=1
            fi
          done
          if [ $fail -ne 0 ]; then
            echo ""
            echo "Regenerate the committed standings with:"
            echo "  npx laplacebench standings community/runs/* --out community/STANDINGS.md --json-out community/standings.json"
            exit 1
          fi
