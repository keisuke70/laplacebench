name: Verify community runs

on:
  pull_request:
    paths:
      - "community/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: npm test
      - name: Replay-verify every community run
        run: |
          shopt -s nullglob
          dirs=(community/runs/*/)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "no community runs found"; exit 1
          fi
          node packages/cli/dist/cli.js verify "${dirs[@]}"
      - name: Standings preview
        run: node packages/cli/dist/cli.js standings community/runs/*/
